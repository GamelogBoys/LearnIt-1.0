[build]
  command = "echo 'Building production serverless packages...'"
  publish = "public"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express", "ejs", "mongoose", "multer"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true